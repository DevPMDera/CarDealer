<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Vehicle</title>
</head>

<body>

    <h2>Add Vehicle</h2>

    <form id="carForm">

        <input type="text" id="make" placeholder="Make" required><br><br>

        <input type="text" id="model" placeholder="Model" required><br><br>

        <input type="number" id="year" placeholder="Year" required><br><br>

        <input type="number" id="price" placeholder="Price" required><br><br>

        <input type="number" id="mileage" placeholder="Mileage"><br><br>

        <input type="text" id="transmission" placeholder="Transmission"><br><br>

        <input type="text" id="fuelType" placeholder="Fuel Type"><br><br>

        <input type="text" id="color" placeholder="Color"><br><br>

        <input type="text" id="location" placeholder="Location"><br><br>
        
        <input type="text" id="vin" placeholder="Enter VIN Number">

        <textarea
            id="description"
            placeholder="Vehicle Description"></textarea>

        <br><br>

        <label>Cover Image</label><br>

        <input
            type="file"
            id="coverImage"
            accept="image/*">

        <br><br>

        <button type="submit">

            Save Vehicle

        </button>

    </form>

    <script src="https://cdn.jsdelivr.net/npm/appwrite@17.0.0"></script>

    <script src="assets/js/appwrite.js"></script>

    <script src="assets/js/admin-add-car.js"></script>

</body>

</html>
